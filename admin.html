<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Build The Electro Bricks</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Admin Gate ── */
    .admin-gate {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }

    .admin-gate-inner {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .admin-gate-logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .admin-gate-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--text2);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      margin-top: -12px;
    }

    .admin-gate-label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 9px;
    }

    /* Admin specific styles */
    .admin-container {
      max-width: 1000px;
      margin: 40px auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    
    .admin-title {
      font-family: 'Orbitron', monospace;
      color: var(--cyan);
      font-size: 1.5rem;
    }
    
    .table-responsive {
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      text-align: left;
    }
    
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px;
      color: var(--text);
    }
    
    th {
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    tbody tr:hover {
      background: rgba(0, 229, 255, 0.05);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, var(--red) 0%, #880000 100%);
      box-shadow: 0 4px 24px rgba(255, 68, 68, 0.3);
      width: auto;
      padding: 10px 20px;
    }
    
    .btn-danger:hover {
      box-shadow: 0 8px 36px rgba(255, 68, 68, 0.45);
    }
    
    .empty-msg {
      text-align: center;
      padding: 40px;
      color: var(--text2);
      font-style: italic;
    }
    
    .q-id {
      background: rgba(255, 255, 255, 0.1);
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .q-id:hover {
      background: rgba(0, 229, 255, 0.2);
      color: var(--cyan);
    }

    /* ── Question Modal ── */
    .q-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(5, 8, 15, 0.88);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .q-modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .q-modal {
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 32px;
      max-width: 680px;
      width: 100%;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      transform: scale(0.94);
      transition: transform 0.25s;
    }

    .q-modal-overlay.visible .q-modal {
      transform: scale(1);
    }

    .q-modal-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .q-modal-badge.digital {
      background: rgba(0, 229, 255, 0.1);
      color: var(--cyan);
      border: 1px solid rgba(0, 229, 255, 0.25);
    }

    .q-modal-badge.analog {
      background: rgba(255, 179, 0, 0.1);
      color: var(--amber);
      border: 1px solid rgba(255, 179, 0, 0.25);
    }

    .q-modal-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      max-height: 55vh;
      overflow-y: auto;
      padding-right: 6px;
    }

    .q-modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .q-modal-close:hover { color: var(--cyan); }
  </style>
</head>

<body>
  <!-- BACKGROUND LAYERS -->
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <!-- Admin Password Gate -->
  <div class="admin-gate" id="admin-gate">
    <div class="admin-gate-inner fade-up">
      <div class="admin-gate-logo">⚙ ADMIN ACCESS</div>
      <div class="admin-gate-sub">Build The Electro Bricks · Organizer Portal</div>
      <div class="admin-gate-field">
        <label class="admin-gate-label" for="admin-pass-input">Admin Password</label>
        <input
          class="input input-mono"
          id="admin-pass-input"
          type="password"
          placeholder="ENTER ADMIN PASSWORD"
          autocomplete="off"
        />
      </div>
      <div id="admin-gate-error" class="error-msg hidden">⚠ Incorrect password. Access denied.</div>
      <button class="btn" id="admin-gate-btn">
        <span class="btn-icon">🔐</span>
        <span class="btn-text">Unlock Dashboard</span>
      </button>
    </div>
  </div>

  <!-- Dashboard wrapper (hidden until unlocked) -->
  <div id="admin-dashboard-wrap" style="display:none;">

  <!-- Question Preview Modal -->
  <div class="q-modal-overlay" id="q-modal-overlay">
    <div class="q-modal">
      <button class="q-modal-close" id="q-modal-close">✕</button>
      <div class="q-modal-badge" id="q-modal-badge"></div>
      <div class="q-modal-text" id="q-modal-text"></div>
    </div>
  </div>
  
  <div class="admin-container fade-up">
    <div class="admin-header">
      <div class="admin-title">Admin Dashboard</div>
      <button class="btn btn-danger" id="btn-clear">
        <span class="btn-icon">⚠</span>
        <span class="btn-text">Clear All Data</span>
      </button>
    </div>
    
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Team Name</th>
            <th>Access Code</th>
            <th>Digital Q.</th>
            <th>Analog Q.</th>
            <th>Login Time</th>
          </tr>
        </thead>
        <tbody id="admin-table-body">
          <!-- Rows will be populated via JS -->
        </tbody>
      </table>
    </div>
  </div>

  </div> <!-- end #admin-dashboard-wrap -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="questions.js"></script>
  <script src="admin.js"></script>
</body>

</html>
